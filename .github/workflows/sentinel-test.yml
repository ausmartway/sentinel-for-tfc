name: sentinel
on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sentinel-test:
    runs-on: ubuntu-latest
    container:
      image: thrashr888/sentinel-simulator
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Sentinel Test
        run: sentinel test 